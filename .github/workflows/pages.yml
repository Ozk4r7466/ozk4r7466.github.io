name: Publish to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Patch
        env:
          A61530: ${{ secrets.A61530 }}
          B4451E: ${{ secrets.B4451E }}
        run: |
          python3 -c "
          import sys, pathlib, os
          meta_a = os.environ.get('A61530', '')
          meta_b = os.environ.get('B4451E', '')
          page = pathlib.Path('index.html')
          src = page.read_text(encoding='utf-8')
          out = src
          if meta_a:
              out = out.replace('<!-- f44eb8295c82a0da2d26fde026 -->', meta_a)
          if meta_b:
              out = out.replace('<!-- eaafc6752dff6a7c7c08dce25c27c67608 -->', meta_b)
          if out == src and (meta_a or meta_b):
              sys.exit(1)
          if out != src:
              page.write_text(out, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: publish
        uses: actions/deploy-pages@v4
